version: "3.9"
services:
  protein-env:
    build:
      context: ..
      dockerfile: server/Dockerfile
    ports:
      - "7860:7860"
    environment:
      - PYTHONPATH=/app
      - PORT=7860
      - HF_TOKEN=${HF_TOKEN}
      - API_BASE_URL=${API_BASE_URL}
      - MODEL_NAME=${MODEL_NAME}
    volumes:
      - huggingface_cache:/app/.cache/huggingface
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  huggingface_cache:
